<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="XCopy is a free macOS clipboard manager for text, images, links, and files.">
    <title>XCopy - Free Mac Clipboard Manager</title>
    <style>
        :root {
            --text: #17191d;
            --muted: #717780;
            --line: #e4e6ea;
            --blue: #0b63f6;
            --soft: #f5f6f8;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            color: var(--text);
            background: #ffffff;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        a {
            color: inherit;
        }

        .page {
            width: min(1120px, calc(100% - 34px));
            margin: 0 auto;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            padding: 14px 0 0;
        }

        .lang-dropdown {
            position: relative;
            display: inline-block;
        }

        .lang-dropdown-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            font: inherit;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            background: #ffffff;
            border: 1px solid var(--line);
            border-radius: 8px;
            cursor: pointer;
        }

        .lang-dropdown-btn:hover {
            border-color: var(--blue);
            color: var(--blue);
        }

        .lang-dropdown-btn .arrow {
            font-size: 10px;
            transition: transform 0.2s ease;
        }

        .lang-dropdown-btn.open .arrow {
            transform: rotate(180deg);
        }

        .lang-dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: calc(100% + 4px);
            z-index: 10;
            min-width: 120px;
            overflow: hidden;
            background: #ffffff;
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        .lang-dropdown-menu.show {
            display: block;
        }

        .lang-dropdown-menu button {
            display: block;
            width: 100%;
            padding: 8px 16px;
            font: inherit;
            font-size: 13px;
            color: var(--text);
            text-align: left;
            background: #ffffff;
            border: 0;
            cursor: pointer;
        }

        .lang-dropdown-menu button:hover {
            background: var(--soft);
        }

        .lang-dropdown-menu button.active {
            color: var(--blue);
            font-weight: 700;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px 0 24px;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            text-decoration: none;
        }

        .brand img {
            width: 34px;
            height: 34px;
            border-radius: 8px;
        }

        .hero {
            min-height: calc(100vh - 124px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 42px 0 52px;
            text-align: center;
        }

        .icon {
            width: 118px;
            height: 118px;
            margin: 0 auto 24px;
            border-radius: 26px;
            box-shadow: 0 18px 52px rgba(24, 32, 45, 0.18);
        }

        h1 {
            max-width: 720px;
            margin: 0 auto;
            font-size: clamp(36px, 6vw, 58px);
            line-height: 1.12;
            letter-spacing: 0;
        }

        .lead {
            max-width: 580px;
            margin: 18px auto 0;
            color: #3f4650;
            font-size: 17px;
        }

        .download {
            align-self: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 156px;
            min-width: 0;
            min-height: 38px;
            margin-top: 30px;
            padding: 0 12px;
            border-radius: 7px;
            color: #ffffff;
            background: var(--blue);
            font-size: 14px;
            font-weight: 800;
            text-decoration: none;
            box-shadow: 0 8px 18px rgba(11, 99, 246, 0.18);
        }

        .meta {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0 0;
            padding: 0;
            list-style: none;
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
        }

        .meta li {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            min-height: 28px;
            padding: 0 10px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: #ffffff;
        }

        .meta li::before {
            content: "";
            width: 6px;
            height: 6px;
            border-radius: 999px;
            background: #9aa3ad;
        }

        .screenshots {
            padding: 0 0 76px;
        }

        .screenshot-stack {
            display: grid;
            gap: 22px;
        }

        .screenshot-stack[hidden] {
            display: none;
        }

        .screenshot-stack img {
            display: block;
            width: 100%;
            aspect-ratio: 16 / 10;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--soft);
            box-shadow: 0 18px 44px rgba(24, 32, 45, 0.10);
        }

        footer {
            padding: 24px 0;
            border-top: 1px solid var(--line);
            color: var(--muted);
            text-align: center;
            font-size: 13px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 10px;
        }

        footer a {
            color: var(--muted);
            text-decoration: none;
        }

        footer a:hover {
            color: var(--text);
        }

        @media (max-width: 560px) {
            .top-bar {
                justify-content: flex-start;
            }

            header {
                justify-content: flex-start;
            }

            .hero {
                min-height: auto;
                padding-top: 28px;
            }

            .screenshots {
                padding-bottom: 54px;
            }

            .screenshot-stack {
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="top-bar">
            <div class="lang-dropdown">
                <button class="lang-dropdown-btn" type="button" onclick="toggleDropdown()">
                    <span id="current-lang">English</span>
                    <span class="arrow">▼</span>
                </button>
                <div class="lang-dropdown-menu" id="lang-menu">
                    <button type="button" data-lang-option="en" onclick="switchLang('en')">English</button>
                    <button type="button" data-lang-option="zh" onclick="switchLang('zh')">中文</button>
                </div>
            </div>
        </div>

        <header>
            <a class="brand" href="./">
                <img src="assets/xcopy-icon.png" alt="XCopy">
                <span>XCopy</span>
            </a>
        </header>

        <main class="hero">
            <img class="icon" src="assets/xcopy-icon.png" alt="XCopy">
            <h1 data-i18n="heroTitle">Your clipboard remembers more than one thing.</h1>
            <p class="lead" data-i18n="lead">XCopy keeps what you copy: text, images, links, and files. Press the shortcut and bring it back anytime.</p>
            <a class="download" href="https://raw.githubusercontent.com/Kelvenbit/XCopy-Website/aebdef97fd9e8de8287d3f0dfd8ecf8e408bee67/assets/XCopy.dmg" data-i18n="download">Download</a>
            <ul class="meta" data-i18n-aria="metaLabel" aria-label="Version information">
                <li data-i18n="tagAccount">No account</li>
                <li data-i18n="tagSubscription">No subscription</li>
                <li data-i18n="tagSystem">macOS 14.0+</li>
            </ul>
        </main>

        <section id="screenshots" class="screenshots" data-i18n-aria="screenshotsLabel" aria-label="XCopy screenshots">
            <div class="screenshot-stack" data-lang-group="en">
                <img src="assets/appstore-img/v3/app_store_1_en_v3.png" alt="XCopy English main window screenshot" loading="lazy">
                <img src="assets/appstore-img/v3/app_store_2_en_v3.png" alt="XCopy English search and filter screenshot" loading="lazy">
                <img src="assets/appstore-img/v3/app_store_3_en_v3.png" alt="XCopy English settings screenshot" loading="lazy">
            </div>

            <div class="screenshot-stack" data-lang-group="zh" hidden>
                <img src="assets/appstore-img/v3/app_store_1_zh_v3.png" alt="XCopy 中文主界面截图" loading="lazy">
                <img src="assets/appstore-img/v3/app_store_2_zh_v3.png" alt="XCopy 中文搜索筛选截图" loading="lazy">
                <img src="assets/appstore-img/v3/app_store_3_zh_v3.png" alt="XCopy 中文设置界面截图" loading="lazy">
            </div>
        </section>

        <footer>
            <nav class="footer-links" data-i18n-aria="footerLabel" aria-label="Footer navigation">
                <a href="#screenshots" data-i18n="navScreenshots">Screenshots</a>
                <a href="privacy-policy.html" data-i18n="navPrivacy">Privacy</a>
                <a href="https://github.com/Kelvenbit/XCopy/releases" data-i18n="navReleases">Releases</a>
                <a href="https://github.com/Kelvenbit/XCopy/issues" data-i18n="navIssues">Issues</a>
            </nav>
            <div>© 2026 XCopy</div>
        </footer>
    </div>

    <script>
        var LANG_STORAGE_KEY = 'xcopy-lang';
        var langNames = { en: 'English', zh: '中文' };
        var translations = {
            en: {
                htmlLang: 'en',
                title: 'XCopy - Free Mac Clipboard Manager',
                description: 'XCopy is a free macOS clipboard manager for text, images, links, and files.',
                heroTitle: 'Your clipboard remembers more than one thing.',
                lead: 'XCopy keeps what you copy: text, images, links, and files. Press the shortcut and bring it back anytime.',
                download: 'Download',
                metaLabel: 'Version information',
                tagAccount: 'No account',
                tagSubscription: 'No subscription',
                tagSystem: 'macOS 14.0+',
                screenshotsLabel: 'XCopy screenshots',
                footerLabel: 'Footer navigation',
                navScreenshots: 'Screenshots',
                navPrivacy: 'Privacy',
                navReleases: 'Releases',
                navIssues: 'Issues'
            },
            zh: {
                htmlLang: 'zh-CN',
                title: 'XCopy - 免费 Mac 剪贴板管理器',
                description: 'XCopy 是一款免费的 macOS 剪贴板管理器，帮助你快速找回文本、图片、链接和文件。',
                heroTitle: '你的剪切板不止一条',
                lead: 'XCopy 记住你复制过的一切：文字、图片、链接、文件。按下快捷键，随时找回来。',
                download: '下载',
                metaLabel: '版本信息',
                tagAccount: '无账号',
                tagSubscription: '无订阅',
                tagSystem: 'macOS 14.0+',
                screenshotsLabel: 'XCopy 截图',
                footerLabel: '底部导航',
                navScreenshots: '截图',
                navPrivacy: '隐私',
                navReleases: '版本',
                navIssues: '问题反馈'
            }
        };

        function getBrowserLang() {
            var languages = navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language || 'en'];
            return languages.some(function(lang) {
                return /^zh\b/i.test(lang);
            }) ? 'zh' : 'en';
        }

        function getInitialLang() {
            var saved = localStorage.getItem(LANG_STORAGE_KEY);
            return saved === 'zh' || saved === 'en' ? saved : getBrowserLang();
        }

        function toggleDropdown() {
            var menu = document.getElementById('lang-menu');
            var btn = document.querySelector('.lang-dropdown-btn');
            menu.classList.toggle('show');
            btn.classList.toggle('open');
        }

        function switchLang(lang) {
            var text = translations[lang] || translations.en;
            document.documentElement.lang = text.htmlLang;
            document.title = text.title;
            document.querySelector('meta[name="description"]').setAttribute('content', text.description);
            document.getElementById('current-lang').textContent = langNames[lang];

            document.querySelectorAll('[data-i18n]').forEach(function(el) {
                el.textContent = text[el.getAttribute('data-i18n')];
            });

            document.querySelectorAll('[data-i18n-aria]').forEach(function(el) {
                el.setAttribute('aria-label', text[el.getAttribute('data-i18n-aria')]);
            });

            document.querySelectorAll('[data-lang-option]').forEach(function(btn) {
                btn.classList.toggle('active', btn.getAttribute('data-lang-option') === lang);
            });

            document.querySelectorAll('[data-lang-group]').forEach(function(group) {
                group.hidden = group.getAttribute('data-lang-group') !== lang;
            });

            localStorage.setItem(LANG_STORAGE_KEY, lang);
            document.getElementById('lang-menu').classList.remove('show');
            document.querySelector('.lang-dropdown-btn').classList.remove('open');
        }

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.lang-dropdown')) {
                document.getElementById('lang-menu').classList.remove('show');
                document.querySelector('.lang-dropdown-btn').classList.remove('open');
            }
        });

        switchLang(getInitialLang());
    </script>
</body>
</html>
